<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackout Grid - 8 Neighbors</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #333;
        }

        p {
            margin-bottom: 30px;
            text-align: center;
            color: #555;
            padding: 0 20px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background-color: #888;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .cell {
            width: 18vw;
            height: 18vw;
            max-width: 75px;
            max-height: 75px;
            background-color: #ffffff;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }

        .cell.black {
            background-color: #111111;
        }

        #win-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-content h2 {
            margin-top: 0;
            color: #111;
            font-size: 2rem;
        }

        .play-again-btn {
            background: #111;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .play-again-btn:hover {
            background: #444;
        }
    </style>
</head>

<body>

    <h1>ONLINE BIT FLIP</h1>
    <p>Tap a square to invert it and all <b>8 neighbors</b>.<br>Turn the whole grid <b>black</b> to win!</p>

    <div id="grid"></div>

    <div id="win-modal">
        <div class="modal-content">
            <h2>YOU WIN</h2>
            <button class="play-again-btn" onclick="closeWinModal()">Play Again</button>
        </div>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const winModal = document.getElementById('win-modal');
        let grid = [];
        const size = 4;

        function initBoard() {
            grid = Array(size).fill(0).map(() => Array(size).fill(1));

            for (let i = 0; i < 15; i++) {
                let r = Math.floor(Math.random() * size);
                let c = Math.floor(Math.random() * size);
                toggle(r, c, false);
            }

            if (grid.every(row => row.every(cell => cell === 1))) {
                toggle(0, 0, false);
            }
            render();
        }

        function toggle(r, c, checkWinFlag = true) {
            const coords = [
                [r - 1, c - 1], [r - 1, c], [r - 1, c + 1],
                [r, c - 1], [r, c], [r, c + 1],
                [r + 1, c - 1], [r + 1, c], [r + 1, c + 1]
            ];

            coords.forEach(([nr, nc]) => {
                if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
                    grid[nr][nc] = 1 - grid[nr][nc];
                }
            });

            if (checkWinFlag) {
                render();
                setTimeout(checkWin, 100);
            }
        }

        function render() {
            gridElement.innerHTML = '';
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell ' + (grid[r][c] === 1 ? 'black' : '');
                    cell.onclick = () => toggle(r, c);
                    gridElement.appendChild(cell);
                }
            }
        }

        function checkWin() {
            const isWin = grid.every(row => row.every(cell => cell === 1));
            if (isWin) {
                winModal.style.display = 'flex';
            }
        }

        function closeWinModal() {
            winModal.style.display = 'none';
            initBoard();
        }

        initBoard();
    </script>
</body>

</html>
